<script>
    const launchDate = new Date('2025-05-07T00:00:00');

    function updateTimeSinceLaunch() {
        const now = new Date();
        const diffTime = now - launchDate;

        const totalSeconds = Math.floor(diffTime / 1000);
        const days = Math.floor(totalSeconds / (60 * 60 * 24));
        const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
        const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);

        const output = `(Did you know that this website has been up for ${days} day${days !== 1 ? 's' : ''}, ${hours} hour${hours !== 1 ? 's' : ''}, and ${minutes} minute${minutes !== 1 ? 's' : ''}?)`;

        const paragraph = document.querySelector("#days-since");
        if (paragraph) {
            paragraph.textContent = output;
        }
    }

    // Run it once immediately
    updateTimeSinceLaunch();

    // Then update every 60 seconds
    setInterval(updateTimeSinceLaunch, 60000);
</script>
